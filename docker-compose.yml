services:
  worker:
    image: ${SUBLINK_WORKER_IMAGE:-ghcr.io/milikii/chat-sublink-worker:latest}
    pull_policy: always
    ports:
      - "8787:8787"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_KEY_PREFIX: chat-sublink
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD_SHA256: ${ADMIN_PASSWORD_SHA256:?set ADMIN_PASSWORD_SHA256}
    depends_on:
      - redis
  redis:
    image: redis:7-alpine
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - redis-data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    restart: unless-stopped
volumes:
  redis-data:
